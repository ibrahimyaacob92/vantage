<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>projflow</title>
    <style>
      :root {
        --bg: rgba(245,245,247,0.86); --card: #ffffff; --line: #e7e7ec; --text: #1d1d1f;
        --muted: #86868b; --accent: #0a84ff; --chip: #ececf1;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: rgba(34,34,37,0.9); --card: #2c2c2e; --line: #3a3a3e; --text: #f2f2f4;
                --muted: #9a9aa0; --chip: #3a3a3e; }
      }
      * { box-sizing: border-box; }
      html,body { margin:0; }
      body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text);
             background: var(--bg); padding: 10px; -webkit-user-select: none; }
      .empty { color: var(--muted); text-align: center; padding: 24px 8px; font-size: 12px; }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
              padding: 7px 10px; margin-bottom: 6px; }
      .top { display: flex; align-items: center; gap: 7px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
      .name { font-weight: 600; font-size: 12.5px; }
      .code { font-size: 9.5px; color: var(--muted); font-weight: 600; letter-spacing: .4px; }
      .spacer { flex: 1; }
      .status { font-size: 11px; color: var(--muted); margin: 2px 0 5px; }
      .sessdots { display: inline-flex; gap: 4px; margin-left: 6px; vertical-align: middle; }
      .sd { width: 7px; height: 7px; border-radius: 50%; }
      .chip { font-size: 10px; color: var(--text); background: var(--chip); border-radius: 5px; padding: 1px 6px; margin-left: 6px; }
      .actions { display: flex; gap: 8px; }
      button { font: inherit; font-size: 12px; cursor: pointer; border: 1px solid var(--line);
               background: transparent; color: var(--text); border-radius: 8px; padding: 6px 10px; flex: 1; }
      button:hover { background: var(--chip); }
      button.primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }
      button.primary:hover { filter: brightness(1.08); }
      button:disabled { opacity: .4; cursor: default; }
      .iconbtn { flex: none; width: 28px; height: 24px; padding: 0; display: inline-flex; align-items: center;
                 justify-content: center; border: 1px solid var(--line); background: transparent;
                 color: var(--muted); border-radius: 7px; }
      .iconbtn:hover { background: var(--chip); color: var(--text); }
      .tabs { margin-top: 5px; border-top: 1px solid var(--line); padding-top: 4px; }
      .tab { display: flex; align-items: center; gap: 6px; padding: 2px 6px; border-radius: 6px; }
      .tab:hover { background: var(--chip); }
      .tab .u { flex: 1; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
      .tab .x { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 1px 5px; border-radius: 5px; flex: none; }
      .tab .x:hover { color: #ff453a; background: rgba(255,69,58,.12); }
      .newtab { width: 100%; margin-top: 4px; background: transparent; border: 1px dashed var(--line); color: var(--accent); padding: 4px; border-radius: 7px; font-size: 11px; }
      .newtab:hover { background: var(--chip); }
      .notabs { font-size: 11px; color: var(--muted); padding: 2px 2px 4px; }
      footer { display:flex; gap:8px; padding-top: 4px; }
      footer button { flex: 1; }
      .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px;
                padding: 8px 4px 10px; margin-top: 2px; border-top: 1px solid var(--line); }
      .legend .li { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
      .legend .ld { width: 8px; height: 8px; border-radius: 50%; flex: none; }
      .legend h3 { grid-column: 1 / -1; margin: 0 0 2px; font-size: 10px; text-transform: uppercase;
                   letter-spacing: .5px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="root">
    <div id="list"><div class="empty">loading…</div></div>
    <div class="legend">
      <h3>What the dots mean</h3>
      <div class="li"><span class="ld" style="background:#ff453a"></span>needs you</div>
      <div class="li"><span class="ld" style="background:#ffd60a"></span>working</div>
      <div class="li"><span class="ld" style="background:#30d158"></span>idle</div>
      <div class="li"><span class="ld" style="background:#bf5af0"></span>compacting</div>
      <div class="li"><span class="ld" style="background:#8e8e93"></span>no session</div>
    </div>
    <footer>
      <button id="settings">Settings…</button>
      <button id="quit">Quit</button>
    </footer>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
