<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>projflow</title>
    <style>
      :root {
        --bg: #ffffff; --panel: #f5f5f7; --card: #ffffff; --line: #e6e6eb; --text: #1d1d1f;
        --muted: #86868b; --accent: #0a84ff; --chip: #eeeef2; --field: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #1e1e20; --panel: #262629; --card: #2c2c2e; --line: #3a3a3e; --text: #f2f2f4;
                --muted: #9a9aa0; --accent: #0a84ff; --chip: #3a3a3e; --field: #1c1c1e; }
      }
      * { box-sizing: border-box; }
      body { font: 13px/1.45 -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; color: var(--text); background: var(--bg); }
      header { padding: 18px 20px 14px; }
      h1 { font-size: 17px; font-weight: 700; margin: 0; letter-spacing: -.3px; }
      .tagline { color: var(--muted); font-size: 12px; margin-top: 3px; }
      section { padding: 0 20px 16px; }
      h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 16px 0 9px; }

      .preview { background: #2f3a52; border-radius: 10px; padding: 10px 14px; display: flex; gap: 16px; align-items: center; min-height: 40px; }
      .ptile { display: flex; flex-direction: column; align-items: center; gap: 3px; }
      .ptile .pc { color: #fff; font-size: 9px; font-weight: 600; letter-spacing: .4px; }
      .ptile .pd { display: flex; gap: 3px; }
      .ptile .pdot { width: 5px; height: 5px; border-radius: 50%; }
      .preview .none { color: #aab; font-size: 11px; }
      .pref { display: flex; align-items: center; gap: 7px; margin-top: 10px; font-size: 12.5px; color: var(--text); cursor: pointer; }
      .pref input { width: 14px; height: 14px; cursor: pointer; }

      .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
      .row { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-top: 1px solid var(--line); }
      .row:first-child { border-top: none; }
      .row.off .nm, .row.off .path, .row.off .code, .row.off .dot, .row.off .chip { opacity: .42; }
      .iconbtn { flex: none; width: 30px; height: 26px; padding: 0; display: inline-flex; align-items: center;
                 justify-content: center; border: none; background: none; color: var(--muted); border-radius: 7px; cursor: pointer; }
      .iconbtn:hover { background: var(--chip); color: var(--text); }
      .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
      .nm { font-weight: 600; }
      .code { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: .5px; background: var(--chip); padding: 1px 5px; border-radius: 4px; }
      .path { color: var(--muted); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .spacer { flex: 1; }
      .chip { font-size: 10.5px; color: var(--text); background: var(--chip); border-radius: 5px; padding: 2px 7px; font-variant-numeric: tabular-nums; }
      .st { font-size: 11px; color: var(--muted); }
      .remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 5px 8px; border-radius: 6px; }
      .remove:hover { color: #ff453a; background: rgba(255,69,58,.12); }
      .empty { color: var(--muted); font-size: 12px; padding: 16px; text-align: center; }

      form { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
      .f { display: flex; flex-direction: column; gap: 4px; }
      .f.full { grid-column: 1 / -1; }
      label { font-size: 10.5px; color: var(--muted); font-weight: 500; }
      .pathrow { display: flex; gap: 7px; }
      input { font: inherit; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--field); color: var(--text); width: 100%; }
      input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(10,132,255,.15); }
      input::placeholder { color: var(--muted); opacity: .7; }
      button { font: inherit; cursor: pointer; border-radius: 8px; }
      .browse { white-space: nowrap; border: 1px solid var(--line); background: var(--panel); color: var(--text); padding: 8px 12px; }
      .browse:hover { filter: brightness(.97); }
      .add { grid-column: 1 / -1; background: var(--accent); color: #fff; border: none; font-weight: 600; padding: 10px; font-size: 13px; }
      .add:hover { filter: brightness(1.07); }
    </style>
  </head>
  <body>
    <header>
      <h1>projflow</h1>
      <div class="tagline">which of your projects needs you, at a glance</div>
    </header>

    <section>
      <h2>Menu bar preview</h2>
      <div id="preview" class="preview"><span class="none">loading…</span></div>
      <label class="pref"><input type="checkbox" id="startup" /> Open projflow automatically at login</label>
    </section>

    <section>
      <h2>Projects</h2>
      <div id="list" class="card"><div class="empty">loading…</div></div>
    </section>

    <section>
      <h2 id="formtitle">Add a project</h2>
      <form id="addform">
        <div class="f full">
          <label>Project folder</label>
          <div class="pathrow">
            <input id="path" placeholder="/Users/you/dev/my-app" />
            <button type="button" id="browse" class="browse">Browse…</button>
          </div>
        </div>
        <div class="f"><label>Name</label><input id="name" placeholder="my-app" /></div>
        <div class="f"><label>Code (4 letters)</label><input id="code" placeholder="MYAP" maxlength="4" /></div>
        <div class="f"><label>Dev command</label><input id="cmd" placeholder="pnpm dev" /></div>
        <div class="f"><label>Port (optional)</label><input id="port" placeholder="3000" /></div>
        <div class="f full" style="flex-direction:row; gap:8px;">
          <button type="button" id="cancel" class="browse" style="display:none; flex:0 0 auto;">Cancel</button>
          <button type="submit" id="submit" class="add" style="flex:1;">Add project</button>
        </div>
      </form>
    </section>

    <script type="module" src="./index.js"></script>
  </body>
</html>
