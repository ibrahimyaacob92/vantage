<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>projflow</title>
    <style>
      body { font: 13px -apple-system, sans-serif; margin: 0; padding: 0; color: #1d1d1f; background: #fff; }
      header { padding: 14px 16px 10px; }
      h1 { font-size: 15px; margin: 0 0 2px; }
      .sub { color: #888; font-size: 11px; }
      #bar { font-size: 18px; padding: 10px 16px; background: #f5f5f7; border-top: 1px solid #e5e5e5; border-bottom: 1px solid #e5e5e5; letter-spacing: 1px; }
      section { padding: 10px 16px; }
      h2 { font-size: 11px; text-transform: uppercase; color: #999; letter-spacing: .5px; margin: 4px 0 8px; }
      .proj { display: flex; align-items: center; gap: 8px; border-top: 1px solid #eee; padding: 8px 0; }
      .proj:first-child { border-top: none; }
      .dot { font-size: 14px; }
      .nm { font-weight: 600; }
      .det { color: #888; font-size: 11px; }
      .badge { font-size: 10px; color: #555; background: #eee; border-radius: 4px; padding: 1px 5px; }
      input { font: inherit; padding: 3px 5px; margin: 2px; border: 1px solid #ccc; border-radius: 5px; }
      button { font: inherit; cursor: pointer; }
      .muted { color: #888; }
      .addrow { border-top: 1px solid #eee; padding-top: 10px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <header>
      <h1>projflow</h1>
      <div class="sub">which of your projects needs you, at a glance</div>
    </header>
    <div id="bar">starting…</div>

    <section>
      <h2>Live status</h2>
      <div id="status"></div>
    </section>

    <section>
      <h2>Projects</h2>
      <div id="list"></div>
      <div class="addrow">
        <input id="name" placeholder="name" size="9" />
        <input id="path" placeholder="/abs/path" size="20" />
        <input id="cmd" placeholder="pnpm dev" size="8" />
        <input id="port" placeholder="port" size="4" />
        <button id="add">Add</button>
      </div>
    </section>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
